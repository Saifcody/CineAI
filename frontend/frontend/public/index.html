<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0e0c10" />
  <meta name="description" content="CineAI movie discovery app" />
  <title>CineAI</title>
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />
  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@300;400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />
</head>

<body>
<div id="root"></div>

<!-- HEADER -->
<header class="p-5 flex justify-between items-center">
  <h1 class="text-2xl font-bold text-yellow-400">CineAI 🎬</h1>
</header>

<!-- SEARCH -->
<div class="text-center mt-6">
  <input id="searchInput" class="px-4 py-3 w-80 rounded-xl bg-gray-800 border border-gray-600"
    placeholder="What do you want to watch?" />

  <button onclick="searchMovie()" class="ml-2 px-6 py-3 bg-yellow-400 text-black rounded-xl">
    Search
  </button>
</div>

<!-- CATEGORY SECTION -->
<section class="max-w-6xl mx-auto mt-10 px-5">
  <h2 class="text-xl font-bold mb-4">Explore by Genre</h2>

  <input id="categorySearch" placeholder="Search category..."
    class="mb-4 px-4 py-2 w-full rounded-lg bg-gray-800 border border-gray-600" />

  <div id="categoryContainer" class="flex flex-wrap gap-2"></div>
</section>

<!-- MOVIES -->
<div id="movies" class="grid grid-cols-2 md:grid-cols-4 gap-6 p-6"></div>

<script>
const API_KEY = "YOUR_API_KEY";
const BASE_URL = "https://api.themoviedb.org/3";

const categories = [
"Action","Adventure","Comedy","Drama","Horror","Romance","Sci-Fi","Thriller",
"Fantasy","Mystery","Crime","Animation","Documentary","Family","War","Western",
"Cyberpunk","Psychological","Supernatural","Time Travel","Sports","Musical"
];

const container = document.getElementById("categoryContainer");

// Load Categories
categories.forEach(cat => {
  const btn = document.createElement("button");
  btn.innerText = cat;
  btn.className = "chip";

  btn.onclick = () => {
    document.querySelectorAll(".chip").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    fetchMovies(cat);
  };

  container.appendChild(btn);
});

// Search Category Filter
document.getElementById("categorySearch").addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase();
  document.querySelectorAll(".chip").forEach(btn => {
    btn.style.display = btn.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});

// Fetch Movies
async function fetchMovies(query) {
  const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${query}`);
  const data = await res.json();
  displayMovies(data.results || []);
}

// Search Input
function searchMovie() {
  const query = document.getElementById("searchInput").value;
  fetchMovies(query);
}

// Display Movies
function displayMovies(movies) {
  movies = Array.isArray(movies) ? movies : [];
  const movieDiv = document.getElementById("movies");
  movieDiv.innerHTML = "";

  movies.slice(0, 12).forEach(movie => {
    const card = `
      <div class="bg-gray-900 rounded-xl p-3 hover:scale-105 transition">
        <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" 
             class="rounded-lg mb-2"/>
        <h3 class="text-sm font-semibold">${movie.title}</h3>
        <p class="text-yellow-400 text-xs">⭐ ${movie.vote_average}</p>
      </div>
    `;
    movieDiv.innerHTML += card;
  });
}
</script>

</body>
</html>
